version: "3.9"

services:
  backend:
    build: .
    container_name: flask_backend
    ports:
      - "8000:8000"
    depends_on:
      - mysql
    env_file:
      - .env
    restart: always

  mysql:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3310:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: